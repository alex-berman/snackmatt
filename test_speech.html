<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Android ASR + TTS test</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    button { font-size: 1.2rem; padding: 0.8rem 1rem; }
    #status { margin-top: 1rem; }
    #heard { font-weight: bold; }
  </style>
</head>
<body>
  <h1>ASR + TTS echo test</h1>

  <button id="btn">Tap, speak, echo</button>

  <p id="status">Idle</p>
  <p>Heard: <span id="heard">—</span></p>
  <p id="error" style="color: red;"></p>

  <script>
    const errorEl = document.getElementById("error");

    function showError(msg) {
      errorEl.textContent = msg;
    }

    function clearError() {
      errorEl.textContent = "";
    }

    speechSynthesis.onvoiceschanged = () => {
      const voices = speechSynthesis.getVoices();

      statusEl.textContent =
        `Loaded ${voices.length} TTS voices`;

      // Optional: show all voices on screen
      // showError(
      //   voices.map(v => `${v.name} (${v.lang})`).join("\n")
      // );
    };

    const SpeechRecognition =
      window.SpeechRecognition || window.webkitSpeechRecognition;

    const btn = document.getElementById("btn");
    const statusEl = document.getElementById("status");
    const heardEl = document.getElementById("heard");

    function getSwedishVoice() {
      const voices = speechSynthesis.getVoices();

      return voices.find(v => v.lang === "sv-SE")
          || voices.find(v => v.lang.startsWith("sv"))
          || null;
    }

    function speak(text) {
      clearError();
      speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "sv-SE";

      const voice = getSwedishVoice();
      if (voice) {
        utterance.voice = voice;
      } else {
        showError("No Swedish TTS voice found. Available voices:",
          speechSynthesis.getVoices().map(v => `${v.name} ${v.lang}`)
        );
      }

      speechSynthesis.speak(utterance);
    }

    btn.onclick = () => {
      if (!SpeechRecognition) {
        statusEl.textContent = "Speech recognition not supported in this browser.";
        return;
      }

      if (!("speechSynthesis" in window)) {
        statusEl.textContent = "Speech synthesis not supported in this browser.";
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = "sv-SE";
      recognition.interimResults = false;
      recognition.continuous = false;
      recognition.maxAlternatives = 1;

      btn.disabled = true;
      statusEl.textContent = "Listening…";
      heardEl.textContent = "—";

      recognition.onresult = event => {
        const text = event.results[0][0].transcript;
        heardEl.textContent = text;
        statusEl.textContent = "Speaking…";
        speak(`Du sa: ${text}`);
      };

      recognition.onerror = event => {
        showError(`TTS Error: ${event.error}`);
      };

      recognition.onend = () => {
        btn.disabled = false;
        if (statusEl.textContent === "Listening…") {
          statusEl.textContent = "No speech detected.";
        } else if (statusEl.textContent === "Speaking…") {
          statusEl.textContent = "Done.";
        }
      };

      recognition.start();
    };
  </script>
</body>
</html>
